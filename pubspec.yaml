name: mokges
description: Mokges - Smart Daily Planner & Habit Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Database
  sqflite: ^2.3.2
  path: ^1.8.3

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # Home Widget
  home_widget: ^0.4.1

  # HTTP
  http: ^1.2.0

  # UI & Animation
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.1

  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
